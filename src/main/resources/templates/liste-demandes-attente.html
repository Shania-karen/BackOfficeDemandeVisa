<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Liste des demandes en attente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Demandes de Visa En Attente</h2>
        <div>
            <span class="me-3">Connecté en tant que: <strong sec:authentication="name"></strong> (<span sec:authentication="principal.authorities"></span>)</span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-outline-danger btn-sm">Se Déconnecter</button>
            </form>
        </div>
    </div>
    
    <div th:if="${param.success}" class="alert alert-success">
        Action effectuée avec succès !
    </div>
    
    <div class="row">
        <div class="col-md-12">
            <div class="card shadow">
                <div class="card-body">
                    <table class="table table-hover table-striped">
                        <thead class="table-warning">
                            <tr>
                                <th>#</th>
                                <th>Demandeur</th>
                                <th>Type de Demande</th>
                                <th>Date Demande</th>
                                <th>Catégorie Visa</th>
                                <th>Nationalité</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                          <tr th:each="demande : ${demandes}">
                                <td th:text="${demande.id}">1</td>
                                <td th:text="${demande.demandeur?.nom} + ' ' + ${demande.demandeur?.prenom}">Nom Prénom</td>
                                <td>
                                    <span th:if="${demande.typeDemande?.libelle == 'Duplicata'}" class="badge bg-success">
                                        📋 <span th:text="${demande.typeDemande?.libelle}">Type</span>
                                    </span>
                                    <span th:if="${demande.typeDemande?.libelle == 'Transfert'}" class="badge bg-info">
                                        ✈️ <span th:text="${demande.typeDemande?.libelle}">Type</span>
                                    </span>
                                    <span th:if="${demande.typeDemande?.libelle == 'Nouveau titre'}" class="badge bg-primary">
                                        📄 <span th:text="${demande.typeDemande?.libelle}">Type</span>
                                    </span>
                                </td>
                                <td th:text="${demande.dateDemande}">Date</td>
                                <td th:text="${demande.categorieVisa?.libelle}">Catégorie</td>
                                <td th:text="${demande.demandeur?.nationalite?.libelle}">Nationalité</td>
                                <td>
                                    <a th:href="@{'/demande/' + ${demande.id}}" class="btn btn-sm btn-primary">Détails / Traiter</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(demandes)}">
                                <td colspan="7" class="text-center text-muted">Aucune demande en attente.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="mt-3">
                <a th:href="@{/demandes/acceptees}" class="btn btn-info">Voir les demandes validées</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
