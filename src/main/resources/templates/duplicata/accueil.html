<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Duplicata de Carte Résident</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>Demande de Duplicata de Carte Résident</h3>
        </div>
        <div class="card-body">
            <p class="text-muted text-center">Veuillez sélectionner le type de demande :</p>
            
            <div class="row mt-4">
                <div class="col-md-6">
                    <div class="card border-primary">
                        <div class="card-body text-center">
                            <h5 class="card-title">Avec données antérieures</h5>
                            <p class="card-text">Vous possédez déjà une carte résident et souhaitez un duplicata.</p>
                            <a href="/duplicata/avec-anterieur/recherche" class="btn btn-primary">Continuer</a>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="card border-success">
                        <div class="card-body text-center">
                            <h5 class="card-title">Sans données antérieures</h5>
                            <p class="card-text">Vous n'avez pas encore de données enregistrées.</p>
                            <a href="/duplicata/sans-anterieur/saisie" class="btn btn-success">Continuer</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <a href="/" class="btn btn-secondary">Retour</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
