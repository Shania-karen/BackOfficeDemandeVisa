<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recherche Carte Résident - Duplicata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>Recherche de Carte Résident Existante</h3>
        </div>
        <div class="card-body">
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Erreur :</strong> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/duplicata/avec-anterieur/recherche}" method="post" th:object="${searchDTO}">
                <div class="mb-3">
                    <label for="numeroCarte" class="form-label">Numéro de Carte Résident <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="numeroCarte" name="numeroCarte" 
                           th:value="*{numeroCarte}" required placeholder="Ex: CR-2024-00001">
                </div>

                <button type="submit" class="btn btn-primary w-100">Rechercher</button>
            </form>

            <div class="mt-4 text-center">
                <p>Pas de données antérieures ?</p>
                <a href="/duplicata/sans-anterieur/saisie" class="btn btn-success">Utiliser la saisie complète</a>
            </div>

            <div class="mt-4 text-center">
                <a href="/duplicata" class="btn btn-secondary">Retour</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
