<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Demande de Visa - Madagascar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>Demande adressée à Mr le Ministère de l'Intérieur</h3>
        </div>
        <div class="card-body">
            <form id="visaForm">
                <h5 class="border-bottom pb-2">Informations Personnelles</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Genre</label>
                        <select class="form-select" name="genre" id="genre" onchange="toggleNomJeuneFille()">
                            <option value="M">Masculin</option>
                            <option value="F">Féminin</option>
                        </select>
                    </div>
                    <div class="col-md-6" id="divNomJeuneFille" style="display:none;">
                        <label class="form-label">Nom de jeune fille</label>
                        <input type="text" class="form-control" name="nomJeuneFille">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nom</label>
                        <input type="text" class="form-control" name="nom" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Prénom</label>
                        <input type="text" class="form-control" name="prenom" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Né(e) le</label>
                        <input type="date" class="form-control" name="dateNaissance" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Situation de famille</label>
                        <select class="form-select" name="idSituationFamiliale" required>
                            <option value="">Sélectionner...</option>
                            <option th:each="sit : ${situations}" th:value="${sit.id}" th:text="${sit.libelle}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Nationalité</label>
                        <select class="form-select" name="idNationalite" required>
                            <option value="">Sélectionner...</option>
                            <option th:each="nat : ${nationalites}" th:value="${nat.id}" th:text="${nat.libelle}"></option>
                        </select>
                    </div>
                </div>

                <h5 class="border-bottom pb-2 mt-4">Coordonnées</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Domicile (Pays d'origine)</label>
                        <input type="text" class="form-control" name="domicile" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Adresse à Madagascar</label>
                        <input type="text" class="form-control" name="adresseMada" required>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Contact (Tel)</label>
                        <input type="number" class="form-control" name="contact" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                </div>

                <h5 class="border-bottom pb-2 mt-4">Informations concernant le Passeport</h5>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">N° de Passeport</label>
                        <input type="text" class="form-control" name="numeroPasseport" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Date de délivrance</label>
                        <input type="date" class="form-control" name="dateDelivrancePasseport" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Date d'expiration</label>
                        <input type="date" class="form-control" name="dateExpirationPasseport" required>
                    </div>
                </div>

                <h5 class="border-bottom pb-2 mt-4">Type de Visa & Pièces Fournies</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Catégorie de Visa</label>
                        <select class="form-select" name="idCategorieVisa" id="categorieVisa" onchange="updateChecklist()">
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.libelle}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Réf Visa Transformable (existant)</label>
                        <input type="text" class="form-control" name="refVisaTransformable" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Pièces à fournir (Cocher les pièces présentes) :</label>
                    <div id="checklistPieces" class="p-3 border rounded bg-white">
                        <div th:each="piece : ${pieces}" class="form-check piece-item" th:attr="data-code=${piece.code}">
                            <input class="form-check-input" type="checkbox" name="idsPiecesFournies" th:value="${piece.id}" th:id="'piece_' + ${piece.id}">
                            <label class="form-check-label" th:for="'piece_' + ${piece.id}">
                                <span th:text="${piece.libelle}"></span>
                                <span th:if="${piece.obligatoire}" class="text-danger">(Obligatoire)</span>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="button" onclick="envoyerDemande()" class="btn btn-success w-100 mt-3">Soumettre la demande</button>
            </form>
        </div>
    </div>
</div>

<script>
function updateChecklist() {
    const select = document.getElementById("categorieVisa");
    if (!select || select.selectedIndex === -1) return;
    
    // Récupérer le texte sélectionné (ex: "Investisseur", "Travailleur")
    const categorieText = select.options[select.selectedIndex].text.toUpperCase();
    
    // Déterminer le préfixe attendu (INV pour investisseur, TRA pour travailleur)
    let expectedPrefix = "";
    if (categorieText.includes("INVEST")) expectedPrefix = "INV";
    else if (categorieText.includes("TRAVAIL")) expectedPrefix = "TRA";
    
    // Afficher/Cacher les pièces selon leur data-code
    const pieces = document.querySelectorAll('.piece-item');
    pieces.forEach(piece => {
        const code = piece.getAttribute('data-code') || "";
        
        // Afficher si c'est une pièce Commune (COM) ou si le préfixe correspond à la catégorie
        if (code.startsWith("COM") || (expectedPrefix !== "" && code.startsWith(expectedPrefix))) {
            piece.style.display = "block";
        } else {
            piece.style.display = "none";
            // On décoche la case si la pièce vient d'être cachée pour éviter des envois invalides
            const checkbox = piece.querySelector('input[type="checkbox"]');
            if (checkbox) checkbox.checked = false;
        }
    });
}

function toggleNomJeuneFille() {
    const genre = document.getElementById('genre').value;
    const div = document.getElementById('divNomJeuneFille');
    div.style.display = (genre === 'F') ? 'block' : 'none';
}

function envoyerDemande() {
    const form = document.getElementById('visaForm');
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());
    
    // Récupérer les cases cochées
    data.idsPiecesFournies = Array.from(document.querySelectorAll('input[name="idsPiecesFournies"]:checked')).map(cb => parseInt(cb.value));

    fetch('/api/demandes/soumettre', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.text().then(text => ({ status: response.status, text })))
    .then(res => {
        if (res.status === 200) alert("Succès : " + res.text);
        else alert("Erreur : " + res.text);
    });
}

// Initialiser l'affichage dès le chargement de la page
document.addEventListener("DOMContentLoaded", function() {
    updateChecklist();
    toggleNomJeuneFille();
});
</script>
</body>
</html>
