<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion BackOffice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <h4>Connexion Espace BackOffice</h4>
                </div>
                <div class="card-body">
                    
                    <div th:if="${param.error}" class="alert alert-danger">
                        Identifiant ou mot de passe incorrect.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">
                        Vous avez été déconnecté avec succès.
                    </div>

                    <form th:action="@{/login}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Identifiant</label>
                            <input type="text" name="username" class="form-control" required autofocus placeholder="Ex: admin ou rh">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Se Connecter</button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
