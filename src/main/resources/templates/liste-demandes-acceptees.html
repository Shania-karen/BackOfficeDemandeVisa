<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des demandes acceptées</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Demandes de Visa Acceptées</h2>
    
    <div class="row">
        <div class="col-md-12">
            <div class="card shadow">
                <div class="card-body">
                    <table class="table table-hover table-striped">
                        <thead class="table-success">
                            <tr>
                                <th>#</th>
                                <th>Demandeur</th>
                                <th>Type de Demande</th>
                                <th>Date Demande</th>
                                <th>Catégorie Visa</th>
                                <th>Nationalité</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                           <tr th:each="demande : ${demandes}">
                                <td th:text="${demande.id}">1</td>
                                <td th:text="${demande.demandeur?.nom} + ' ' + ${demande.demandeur?.prenom}">Nom Prénom</td>
                                <td>
                                    <span th:if="${demande.typeDemande?.libelle == 'Duplicata'}" class="badge bg-success">
                                        📋 <span th:text="${demande.typeDemande?.libelle}">Type</span>
                                    </span>
                                    <span th:if="${demande.typeDemande?.libelle == 'Transfert'}" class="badge bg-info">
                                        ✈️ <span th:text="${demande.typeDemande?.libelle}">Type</span>
                                    </span>
                                    <span th:if="${demande.typeDemande?.libelle == 'Nouveau titre'}" class="badge bg-primary">
                                        📄 <span th:text="${demande.typeDemande?.libelle}">Type</span>
                                    </span>
                                </td>
                                <td th:text="${demande.dateDemande}">Date</td>
                                <td th:text="${demande.categorieVisa?.libelle}">Catégorie</td>
                                <td th:text="${demande.demandeur?.nationalite?.libelle}">Nationalité</td>
                                <td>
                                    <a th:href="@{'/demande/' + ${demande.id}}" class="btn btn-sm btn-primary">Détails</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(demandes)}">
                                <td colspan="7" class="text-center text-muted">Aucune demande acceptée trouvée.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="mt-3">
                <a th:href="@{/demandes/attente}" class="btn btn-secondary">Retour aux demandes en attente</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
